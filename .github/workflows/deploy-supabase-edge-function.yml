name: Deploy Supabase Edge Function

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/analyze-wine-menu/**"
      - "supabase/config.toml"
      - "supabase/deno.json"
      - "supabase/package.json"
      - "supabase/package-lock.json"
      - ".github/workflows/deploy-supabase-edge-function.yml"
  workflow_dispatch:

concurrency:
  group: deploy-analyze-wine-menu
  cancel-in-progress: true

jobs:
  deploy:
    name: Lint, test, and deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supabase
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install npm dependencies
        run: npm ci

      - name: Lint edge function
        run: npm run lint

      - name: Type-check edge function
        run: npm run check

      - name: Test edge function
        run: npm test

      - name: Deploy analyze-wine-menu
        run: supabase functions deploy analyze-wine-menu --project-ref "$SUPABASE_PROJECT_ID"
